services:
  backend:
    build: .
    container_name: teacorner-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy  # ← wait until postgres is actually ready
    networks:
      - teacorner-network

  postgres:
    image: postgres:16
    container_name: teacorner-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: tea_corner
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - teacorner-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  teacorner-network:

volumes:
  pgdata: